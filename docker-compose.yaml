services:
  db:
    image: postgres:18
    container_name: postgres-db
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql

  redis:
    image: redis:7-alpine
    container_name: ebst_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  postgres_data: